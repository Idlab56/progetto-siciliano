<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button autoHide="false"></ion-menu-button>
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ evento?.titolo }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div>
    <img [src]="evento?.immagineCopertina" alt="" style="width:100%;height:320px;object-fit:cover;">
  </div>
  <ion-grid style="padding:16px;">
    <ion-row>
      <ion-col>
        <h2>{{ evento?.titolo }}</h2>
        <div><strong>Luogo:</strong> {{ evento?.luogo }}</div>
        <div><strong>Data:</strong> {{ evento?.data }} - {{ evento?.orario }}</div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col>
        <p style="margin-top:12px;">{{ evento?.descrizione }}</p>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-button expand="block" color="primary" (click)="salva()">Salva nei preferiti</ion-button>
  </ion-toolbar>
</ion-footer>
