<ion-app>
  <ion-menu side="start" menuId="accountMenu" contentId="main-content">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Account</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-item>
          <ion-label>
            <h3>Stato</h3>
            <p>{{ isLoggedIn ? 'Connesso' : 'Non connesso' }}</p>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-label>
            <h3>Preferiti</h3>
            <p>{{ preferitiCount }} eventi salvati</p>
          </ion-label>
        </ion-item>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/profilo" detail *ngIf="isLoggedIn">
            Profilo
          </ion-item>
          <ion-item routerLink="/login" detail *ngIf="!isLoggedIn">
            Login
          </ion-item>
          <ion-item button (click)="logout()" *ngIf="isLoggedIn">
            Logout
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
