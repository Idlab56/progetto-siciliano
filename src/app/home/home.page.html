<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button autoHide="false"></ion-menu-button>
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Eventi</ion-title>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-searchbar (ionInput)="cerca($any($event.target).value)" placeholder="Cerca eventi, luogo..."></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="display:flex;gap:8px;overflow:auto;padding:8px 0;">
    <ion-chip button (click)="filtra('')">
      <ion-label>Tutti</ion-label>
    </ion-chip>
    <ion-chip *ngFor="let c of categorie" button (click)="filtra(c)">
      <ion-label>{{ c }}</ion-label>
    </ion-chip>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
    <ion-card *ngFor="let evento of eventiFiltrati">
      <img src="{{ evento.immagineCopertina }}" alt="{{ evento.titolo }}" style="width:100%;height:160px;object-fit:cover;border-top-left-radius:12px;border-top-right-radius:12px;">
      <ion-card-header>
        <ion-card-title>{{ evento.titolo }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <div>{{ evento.data }} - {{ evento.orario }}</div>
        <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;">
          <a [routerLink]="['/dettaglio', evento.id]"><ion-button color="primary">Dettagli</ion-button></a>
          <div style="font-weight:600">{{ evento.prezzo | currency:'EUR' }}</div>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
